<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Blog App</title>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-5">
        <h1 class="fw-bold">📝 BlogBuddy </h1>
        <p class="text-muted">your journaling partner..!!</p>
    </div>

    <!-- Add Article Card -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h4 class="mb-3">Add New Article</h4>

            <form action="/add" method="post">
                <div class="mb-3">
                    <input type="text" name="title" class="form-control" placeholder="Enter title" required>
                </div>

                <div class="mb-3">
                    <textarea name="content" class="form-control" rows="4" placeholder="Write content..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Publish</button>
            </form>
        </div>
    </div>

    <!-- Articles Section -->
    <h3 class="mb-3">All Articles</h3>

    <div th:if="${#lists.isEmpty(articles)}" class="alert alert-info">
        No articles yet.
    </div>

    <div th:each="article : ${articles}" class="card shadow-sm mb-3">
        <div class="card-body">
            <h5 class="card-title fw-bold" th:text="${article.title}"></h5>
            <p class="card-text" th:text="${article.content}"></p>

            <form th:action="@{'/delete/' + ${article.id}}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
